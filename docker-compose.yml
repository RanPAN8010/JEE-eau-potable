services:
  db-mysql:
    image: mysql:8.0
    container_name: qualieau-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qualieau_db
    ports:
      - "3307:3306"
    volumes:
      # Chemins relatifs pour fonctionner sur n'importe quel PC
      - ./mysql_data:/var/lib/mysql
      - ./mysql_files:/var/lib/mysql-files

  web-tomcat:
    image: tomcat:11.0-jdk21
    container_name: qualieau-tomcat
    ports:
      - "8081:8080"
    volumes:
      # On pointe bien vers le dossier "target" où Maven crée le fichier .war
      - ./target:/usr/local/tomcat/webapps
    depends_on:
      - db-mysql